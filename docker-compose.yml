version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/controltower
      - INNGEST_BASE_URL=http://inngest:8288
    env_file:
      - .env
    depends_on:
      - db
      - inngest

  inngest:
    image: inngest/inngest:latest
    ports:
      - "8288:8288"
    command: ["inngest", "dev", "-u", "http://web:3000/api/inngest"]

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: controltower
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  test_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: controltower_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  mock_db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: controltower_mock
    ports:
      - "5434:5432"
    volumes:
      - postgres_mock_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_test_data:
  postgres_mock_data:
